<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - LowGPA to Germany</title>
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
    <link rel="icon" type="image/png" sizes="192x192" href="../images/favicon-192x192.png">
    <link rel="apple-touch-icon" href="../images/favicon-192x192.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css"> <!-- Dedicated Auth CSS -->

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-container">

            <!-- LOGIN VIEW -->
            <div id="view-login">
                <div class="auth-header">
                    <h1>Welcome back</h1>
                    <p>Enter your email and password to log in</p>
                </div>

                <form id="form-login">
                    <div class="form-group">
                        <input type="text" id="login-identifier" required placeholder=" ">
                        <label for="login-identifier">Email or Username</label>
                    </div>
                    <div class="form-group">
                        <input type="password" id="login-password" required placeholder=" ">
                        <label for="login-password">Password</label>
                    </div>
                    <button type="submit" id="btn-login" class="primary-btn">Log In</button>
                </form>

                <div class="auth-toggle">
                    Don't have an account? <a id="toggle-to-signup">Sign up</a>
                </div>
            </div>

            <!-- SIGNUP VIEW -->
            <div id="view-signup" class="hidden">
                <div class="auth-header">
                    <h1>Create an account</h1>
                    <p>Start your journey to Germany today</p>
                </div>

                <form id="form-signup">
                    <div class="form-group">
                        <input type="text" id="signup-name" required placeholder=" ">
                        <label for="signup-name">Full Name</label>
                    </div>
                    <div class="form-group">
                        <input type="text" id="signup-username" required placeholder=" " pattern="[a-zA-Z0-9_]+"
                            title="Only letters, numbers, and underscores allowed">
                        <label for="signup-username">Username</label>
                    </div>
                    <div class="form-group">
                        <input type="email" id="signup-email" required placeholder=" ">
                        <label for="signup-email">Email address</label>
                    </div>
                    <div class="form-group">
                        <input type="password" id="signup-password" minlength="6" required placeholder=" ">
                        <label for="signup-password">Password (Min. 6 chars)</label>
                    </div>
                    <button type="submit" id="btn-signup" class="primary-btn">Create Account</button>
                </form>

                <div class="auth-toggle">
                    Already have an account? <a id="toggle-to-login">Log in</a>
                </div>
            </div>

            <!-- STATUS MESSAGE -->
            <div id="status-message" class="message hidden"></div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
