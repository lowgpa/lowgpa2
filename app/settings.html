<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - LowGPA to Germany</title>
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
    <link rel="icon" type="image/png" sizes="192x192" href="../images/favicon-192x192.png">
    <link rel="apple-touch-icon" href="../images/favicon-192x192.png">

    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .skeleton {
            animation: pulse-skeleton 1.5s infinite ease-in-out;
            color: transparent !important;
            background-color: var(--border) !important;
            border-radius: var(--radius-sm);
            width: fit-content;
            min-width: 100px;
        }

        @keyframes pulse-skeleton {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }
    </style>
</head>

<body class="app-body">

    <!-- Preloader -->
    <div id="brand-preloader"
        style="position: fixed; inset: 0; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.4s ease, visibility 0.4s ease;">
        <div class="loader-logo-wrapper" style="position: relative; width: 60px; height: 60px; margin-bottom: 1rem;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none"
                style="width: 100%; height: 100%; animation: pulse-logo 1.5s ease-in-out infinite;">
                <rect x="10" y="55" width="25" height="45" rx="4" fill="#000000" class="bar-1" />
                <rect x="37.5" y="35" width="25" height="65" rx="4" fill="#DD0000" class="bar-2" />
                <rect x="65" y="15" width="25" height="85" rx="4" fill="#FFCE00" class="bar-3" />
            </svg>
        </div>
    </div>
    <style>
        .bar-1 {
            animation: grow-bar 1.2s ease-in-out infinite alternate;
            transform-origin: bottom;
        }

        .bar-2 {
            animation: grow-bar 1.2s ease-in-out infinite alternate 0.2s;
            transform-origin: bottom;
        }

        .bar-3 {
            animation: grow-bar 1.2s ease-in-out infinite alternate 0.4s;
            transform-origin: bottom;
        }

        @keyframes grow-bar {
            0% {
                transform: scaleY(0.6);
                opacity: 0.7;
            }

            100% {
                transform: scaleY(1);
                opacity: 1;
            }
        }

        @keyframes pulse-logo {
            0% {
                filter: drop-shadow(0 0 4px rgba(221, 0, 0, 0.2));
                transform: scale(0.98);
            }

            50% {
                filter: drop-shadow(0 0 12px rgba(221, 0, 0, 0.4));
                transform: scale(1.02);
            }

            100% {
                filter: drop-shadow(0 0 4px rgba(221, 0, 0, 0.2));
                transform: scale(0.98);
            }
        }
    </style>

    <div class="dashboard-layout" id="dashboard-content" style="opacity: 0; transition: opacity 0.5s ease;">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo" style="margin-bottom: 2rem;">
                <a href="../index.html"
                    style="display: flex; align-items: center; gap: 0.5rem; font-weight: 800; font-size: 1.5rem; color: var(--primary); letter-spacing: -0.05em; text-decoration: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none"
                        style="width: 28px; height: 28px;">
                        <rect x="10" y="55" width="25" height="45" rx="4" fill="#000000" />
                        <rect x="37.5" y="35" width="25" height="65" rx="4" fill="#DD0000" />
                        <rect x="65" y="15" width="25" height="85" rx="4" fill="#FFCE00" />
                    </svg>
                    LowGPA<span style="color:var(--text-primary)">.</span>
                </a>
            </div>

            <ul class="nav-links">
                <li><a href="dashboard.html"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li><a href="applications.html"><i data-lucide="folder-open"></i> Applications</a></li>
                <li><a href="#"><i data-lucide="file-text"></i> Documents</a></li>
                <li><a href="queue-estimator.html"><i data-lucide="clock"></i> Queue Estimator</a></li>
                <li><a href="profile.html"><i data-lucide="user"></i> Profile</a></li>
                <li><a href="settings.html" class="active"><i data-lucide="settings"></i> Settings</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <header class="topbar">
                <div class="topbar-left">
                    <h2 style="margin: 0; font-size: 1.5rem; font-weight: 600; color: var(--text-primary);">Settings
                    </h2>
                </div>

                <div class="topbar-right">
                    <!-- Notification Bell & Dropdown -->
                    <div class="notification-container" style="position: relative;">
                        <div class="header-icon" title="Notifications" id="notification-trigger">
                            <i data-lucide="bell"></i>
                            <span class="notification-badge hidden" id="notification-badge"></span>
                        </div>

                        <!-- Notification Dropdown -->
                        <div class="notification-dropdown" id="notification-dropdown">
                            <div class="notification-header">
                                <h3>Notifications</h3>
                                <button class="mark-all-read hidden" id="mark-all-read">Mark all read</button>
                            </div>
                            <div class="notification-list" id="notification-list">
                                <!-- Notifications dynamically injected here -->
                                <div class="notification-empty">No new notifications</div>
                            </div>
                        </div>
                    </div>

                    <!-- Profile Dropdown -->
                    <div class="profile-menu-container">
                        <div class="profile-trigger" id="profile-trigger">
                            <div class="avatar-circle">
                                <span id="avatar-initials" class="skeleton">...</span>
                            </div>
                            <div class="profile-info">
                                <span id="nav-fullname" class="profile-name-sm skeleton">Fetching</span>
                                <span id="nav-role" class="profile-role-sm skeleton">user</span>
                            </div>
                            <i data-lucide="chevron-down"
                                style="width: 16px; height: 16px; color: var(--text-secondary);"></i>
                        </div>

                        <!-- Dropdown Menu -->
                        <div class="dropdown-menu" id="profile-dropdown">
                            <a href="profile.html" class="dropdown-item">
                                <i data-lucide="user"></i> My Profile
                            </a>
                            <a href="settings.html" class="dropdown-item">
                                <i data-lucide="settings"></i> Account Settings
                            </a>
                            <button id="logout-btn" class="dropdown-item danger">
                                <i data-lucide="log-out"></i> Log Out
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <div class="tracker-header" style="margin-bottom: 2rem;">
                <div>
                    <h1 style="margin: 0; font-size: 2rem; color: var(--text-primary); margin-bottom: 0.25rem;">Account
                        Settings</h1>
                    <p style="color: var(--text-secondary); margin: 0;">Manage your account security and authentication.
                    </p>
                </div>
            </div>

            <!-- Settings Form -->
            <section class="content-card" style="margin-bottom: 2rem; padding: 1.5rem 2rem; max-width: 600px;">
                <h4
                    style="margin: 0 0 1.5rem 0; font-size: 1.1rem; color: var(--text-primary); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">
                    Security & Password</h4>
                <form id="settings-password-form">
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label>Current Password</label>
                        <input type="password" id="current-password" required placeholder="Enter current password">
                    </div>
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label>New Password</label>
                        <input type="password" id="new-password" required placeholder="Enter new password">
                    </div>
                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirm-password" required placeholder="Confirm new password">
                    </div>
                    <button type="submit" class="primary-btn">Update Password</button>
                </form>
            </section>

        </main>
    </div>

    <!-- Scripts -->
    <script src="js/supabase-config.js"></script>
    <script src="js/app-notifications.js"></script>
    <script src="js/app-settings.js"></script>
</body>

</html>
